services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: plant-iot-mqtt

    ports:
      - "127.0.0.1:1883:1883"

    volumes:
     - ./infrastructure/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
     - mosquitto-data:/mosquitto/data

    restart: unless-stopped
  
volumes:
  mosquitto-data:
  